<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Digital Twin - Power Station 360</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-assets>
        <img id="powerstation" 
             src="https://3d.dtia.site/360photo/powerstation.jpg" 
             crossorigin="anonymous">
      </a-assets>

      <a-sky src="#powerstation" rotation="0 -90 0"></a-sky>

      <a-entity camera look-controls>
        <a-cursor color="#FF0000"></a-cursor>
      </a-entity>
    </a-scene>
  </body>
</html>
