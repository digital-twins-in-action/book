<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Spatially located data</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.113.0/Cesium.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.113.0/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, #cesiumContainer { margin: 0; width: 100%; height: 100vh; overflow: hidden; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <script>
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJiYzlkYWY1NC1lY2MyLTQwMTItOTZmOS1iMGZjZDhiYWVlNmMiLCJpZCI6OTA1NDMsImlhdCI6MTc1ODk2NzE3NH0.gbIKYC6HhxEjslsowGakuUorIEnkMjKYBvo49oyd7r0';

        const MAIN = { lat: -31.961505, lon: 115.868492, height: -31 };

        const TILESETS = [
            { url: "https://3d.dtia.site/tiles/tileset.json", lat: MAIN.lat, lon: MAIN.lon, height: MAIN.height, scale: 0.01, rot: -20 },
            { url: "https://3d.dtia.site/pump/tileset.json",  lat: -31.961728, lon: 115.868341, height: -31, scale: 1, rot: 10 },
        ];

        const WAYPOINTS = [
            { x: 15.23, y: 2.90,  id: '00137a1000013507', values: ['energyConsumption: 120521.0 Wh', 'current: 56.0 mA', 'power: 9.0 W', 'voltage: 238.0 V'] },
            { x: 8.05,  y: 3.75,  id: 'a84041dbf1850d33', values: ['humidity: 61.8%', 'temperature: 18.0°C'] },
            { x: 4.44,  y: 1.22,  id: 'a84041ce41845d13', values: ['humidity: 64.6%', 'temperature: 16.7°C'] },
            { x: 10.77, y: 14.33, id: '24e124710b423527', values: ['tvoc: 1.6 ppm', 'pm25: 5.0 μg/m³', 'co2: 708.0 ppm', 'humidity: 55.5%', 'pressure: 1023.8 hPa', 'temperature: 17.2°C', 'pm10: 5.0 μg/m³'] },
            { x: 3.54,  y: 13.2,  id: '24e124148e423058', values: ['energyConsumption: 16564.0 Wh', 'current: 240.0 mA', 'power: 34.0 W', 'voltage: 245.4 V'] },
        ];

        const matrix = (lon, lat, height, scaleFactor, rotationZDeg = 0) =>
            Cesium.Matrix4.multiply(
                Cesium.Transforms.eastNorthUpToFixedFrame(Cesium.Cartesian3.fromDegrees(lon, lat, height)),
                Cesium.Matrix4.multiply(
                    Cesium.Matrix4.fromRotation(Cesium.Matrix3.fromRotationZ(rotationZDeg * Math.PI / 180)),
                    Cesium.Matrix4.fromScale(new Cesium.Cartesian3(scaleFactor, scaleFactor, scaleFactor)),
                    new Cesium.Matrix4()
                ),
                new Cesium.Matrix4()
            );

        const BASE_TRANSFORM_MATRIX = matrix(MAIN.lon, MAIN.lat, -39, 1, -20);

        const localToGeographic = (localCartesian) => {
            const worldPoint = Cesium.Matrix4.multiplyByPoint(BASE_TRANSFORM_MATRIX, localCartesian, new Cesium.Cartesian3());
            const { longitude, latitude, height } = Cesium.Cartographic.fromCartesian(worldPoint);
            return { longitude: Cesium.Math.toDegrees(longitude), latitude: Cesium.Math.toDegrees(latitude), height };
        };

        function localToWorld(x, y) {
            const g = localToGeographic(new Cesium.Cartesian3(x, -y, 10));
            return Cesium.Cartesian3.fromDegrees(g.longitude, g.latitude, g.height);
        }

        function tooltipSvg(id, values) {
            const W = Math.max(160, Math.max(...values.map(v => v.length), id.length + 6) * 7 + 20);
            const H = 24 + values.length * 16 + 16 + 12; // header + lines + padding + arrow
            const A = 8, R = 8;
            return `<svg width="${W}" height="${H}" xmlns="http://www.w3.org/2000/svg">
  <defs><filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
    <feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="0" dy="2" result="o"/>
    <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
    <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter></defs>
  <rect x="5" y="5" width="${W-10}" height="${H-A-10}" rx="${R}" fill="white" stroke="#007bff" stroke-width="2" filter="url(#sh)"/>
  <path d="M${W/2-A} ${H-A-5} L${W/2} ${H-5} L${W/2+A} ${H-A-5}Z" fill="white" stroke="#007bff" stroke-width="2"/>
  <rect x="5" y="5" width="${W-10}" height="24" rx="${R}" fill="#007bff"/>
  <rect x="5" y="${5+R}" width="${W-10}" height="${24-R}" fill="#007bff"/>
  <text x="10" y="21" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="white">📡 ${id}...</text>
  <text x="0" y="29" font-family="Arial,sans-serif">${values.map((v, i) => `<tspan x="10" dy="16" font-size="11" fill="#333">${v}</tspan>`).join('')}</text>
</svg>`;
        }

        async function init() {
            const viewer = new Cesium.Viewer("cesiumContainer", { terrain: Cesium.Terrain.fromWorldTerrain() });
            viewer.scene.primitives.add(await Cesium.createOsmBuildingsAsync());

            await Promise.all(TILESETS.map(async t => {
                const ts = await Cesium.Cesium3DTileset.fromUrl(t.url);
                ts.modelMatrix = matrix(t.lon, t.lat, t.height, t.scale, t.rot);
                viewer.scene.primitives.add(ts);
            }));

            WAYPOINTS.forEach(wp => {
                const url = URL.createObjectURL(new Blob([tooltipSvg(wp.id, wp.values)], { type: 'image/svg+xml' }));
                viewer.entities.add({
                    position: localToWorld(wp.x, wp.y),
                    billboard: {
                        image: url,
                        verticalOrigin: Cesium.VerticalOrigin.BOTTOM,
                        heightReference: Cesium.HeightReference.CLAMP_TO_GROUND,
                        scaleByDistance: new Cesium.NearFarScalar(1.0, 1.0, 1000.0, 0.6)
                    }
                });
            });

            viewer.scene.camera.flyTo({ destination: Cesium.Cartesian3.fromDegrees(MAIN.lon, MAIN.lat, 200) });
        }

        init();
    </script>
</body>
</html>
