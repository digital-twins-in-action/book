<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Digitial Twins in Action</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.113.0/Cesium.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cesium/1.113.0/Widgets/widgets.css" rel="stylesheet">
    <style>
      body, #cesiumContainer { margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh; }
    </style>
  </head>
  <body>
    <div id="cesiumContainer"></div>
    <script>
      Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiIzMjU2Yzk4ZC02OWIzLTRlZmQtYjdkNC05ZDgxY2FhYWExNDUiLCJpZCI6OTA1NDMsImlhdCI6MTY4Mzc2NjM0Nn0.UkbV6Bv-FThPu1wl4Bx5Nxk6oG01Q9bV0VAopblX1DQ';

      const [lat, lon] = [
        -31.896822, 115.864756];


      (async () => {
        const viewer = new Cesium.Viewer("cesiumContainer", {
          terrain: Cesium.Terrain.fromWorldTerrain(),
        });

        const [osmBuildingsTileset, customTileset] = await Promise.all([
          Cesium.createOsmBuildingsAsync(),
          Cesium.Cesium3DTileset.fromUrl("tiles/tileset.json")
        ]);

        viewer.scene.primitives.add(osmBuildingsTileset);
        viewer.scene.primitives.add(customTileset);

        viewer.scene.camera.flyTo({
          destination: Cesium.Cartesian3.fromDegrees(lon, lat, 200)
        });
      })();
    </script>
  </body>
</html>
